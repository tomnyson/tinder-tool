<!DOCTYPE html>
<html>

<head>
    <title>Generate Icons</title>
</head>

<body>
    <h1>Tinder Extension Logo Generator</h1>
    <p>Click các nút bên dưới để download icon:</p>

    <canvas id="canvas128" width="128" height="128"></canvas>
    <button onclick="download(128)">Download 128px</button>

    <canvas id="canvas48" width="48" height="48"></canvas>
    <button onclick="download(48)">Download 48px</button>

    <canvas id="canvas16" width="16" height="16"></canvas>
    <button onclick="download(16)">Download 16px</button>

    <script>
        function drawIcon(size) {
            const canvas = document.getElementById('canvas' + size);
            const ctx = canvas.getContext('2d');
            const scale = size / 128;

            // Background gradient
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#FF6B6B');
            gradient.addColorStop(1, '#FF8E53');

            // Rounded rect background
            ctx.fillStyle = gradient;
            ctx.beginPath();
            const radius = 24 * scale;
            ctx.moveTo(radius, 0);
            ctx.lineTo(size - radius, 0);
            ctx.quadraticCurveTo(size, 0, size, radius);
            ctx.lineTo(size, size - radius);
            ctx.quadraticCurveTo(size, size, size - radius, size);
            ctx.lineTo(radius, size);
            ctx.quadraticCurveTo(0, size, 0, size - radius);
            ctx.lineTo(0, radius);
            ctx.quadraticCurveTo(0, 0, radius, 0);
            ctx.fill();

            // Flame icon
            ctx.fillStyle = 'white';
            ctx.beginPath();
            const cx = size / 2;

            // Flame shape
            ctx.moveTo(cx, 20 * scale);
            ctx.bezierCurveTo(
                cx - 30 * scale, 50 * scale,
                cx - 28 * scale, 85 * scale,
                cx, 100 * scale
            );
            ctx.bezierCurveTo(
                cx + 28 * scale, 85 * scale,
                cx + 30 * scale, 50 * scale,
                cx, 20 * scale
            );
            ctx.fill();

            // Inner flame (orange)
            ctx.fillStyle = '#FF8E53';
            ctx.beginPath();
            ctx.moveTo(cx, 50 * scale);
            ctx.bezierCurveTo(
                cx - 15 * scale, 65 * scale,
                cx - 12 * scale, 85 * scale,
                cx, 92 * scale
            );
            ctx.bezierCurveTo(
                cx + 12 * scale, 85 * scale,
                cx + 15 * scale, 65 * scale,
                cx, 50 * scale
            );
            ctx.fill();

            // Robot eye
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(cx, 75 * scale, 6 * scale, 0, Math.PI * 2);
            ctx.fill();
        }

        function download(size) {
            const canvas = document.getElementById('canvas' + size);
            const link = document.createElement('a');
            link.download = 'icon' + size + '.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // Draw all icons on load
        drawIcon(128);
        drawIcon(48);
        drawIcon(16);
    </script>
</body>

</html>
